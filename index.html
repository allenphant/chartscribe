<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChartScribe — 圖表描述產生器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 40 40" class="leaf" aria-hidden="true">
        <path d="M20 4 C 28 8, 32 16, 30 28 C 24 26, 16 22, 12 14 C 14 8, 18 4, 20 4 Z"
              fill="var(--sc-forest)" opacity="0.45"/>
        <path d="M20 4 L 20 32" stroke="var(--sc-forest)" stroke-width="0.8" opacity="0.6"/>
      </svg>
      <div class="brand-text">
        <h1>ChartScribe</h1>
        <span class="tagline">圖表描述產生器</span>
      </div>
    </div>
    <button id="settings-toggle" type="button">⚙ API key &amp; 模型設定</button>
  </header>

  <section id="settings-panel" class="panel hidden">
    <label>目前使用的 API key
      <select id="active-key"></select>
    </label>
    <button id="delete-key" type="button">刪除此 key</button>
    <fieldset class="add-key">
      <legend>新增 API key</legend>
      <label>名稱
        <input id="new-key-name" type="text" placeholder="例如：個人帳號">
      </label>
      <label>Gemini API key
        <input id="new-key-value" type="password" placeholder="貼上你的 Gemini API key">
      </label>
      <label>模型
        <input id="new-key-model" type="text" placeholder="gemini-3.1-flash-lite">
      </label>
      <button id="add-key" type="button">新增</button>
    </fieldset>
    <p class="hint">API key 僅存於此瀏覽器的 localStorage，只會直接傳給 Google，不經任何中間伺服器。</p>
    <p class="hint notice">建議模型：<b>gemini-3.1-flash-lite</b>。免費方案有頻率限制（每分鐘／每日上限），大量圖片可能需分批或改用付費方案。敏感資料請注意：免費方案下你的輸入可能被 Google 用於改進模型。</p>
  </section>

  <section class="controls">
    <label>風格預設
      <select id="style-preset"></select>
    </label>
    <details class="prompt-editor">
      <summary>檢視 / 編輯此預設的 system prompt</summary>
      <textarea id="preset-prompt" rows="10"></textarea>
      <div class="prompt-editor-actions">
        <button id="preset-reset" type="button">還原預設</button>
        <span class="hint">編輯內容會即時儲存於本機，並用於產生描述。</span>
      </div>
    </details>
    <label>共用指示（套用到整批，選填）
      <textarea id="shared-instructions" rows="2" placeholder="例如：用正式書面語氣"></textarea>
    </label>
    <fieldset class="formats">
      <legend>輸出格式</legend>
      <label><input type="radio" name="fmt" value="plain"> 純文字</label>
      <label><input type="radio" name="fmt" value="markdown" checked> Markdown</label>
      <label><input type="radio" name="fmt" value="latex"> LaTeX</label>
    </fieldset>
  </section>

  <div id="dropzone" class="dropzone">
    拖拉圖片到這裡，或 <button id="file-pick" type="button">點選檔案</button>，或 Ctrl+V 貼上
    <input id="file-input" type="file" accept="image/*" multiple hidden>
  </div>

  <main id="cards" class="cards"></main>

  <footer class="actions">
    <button id="generate-all" type="button">產生全部</button>
    <button id="combine" type="button">合併下載</button>
    <button id="combine-copy" type="button">合併複製</button>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
